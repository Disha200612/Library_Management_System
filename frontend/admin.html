<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Admin Panel</title>

    <link rel="stylesheet" href="style.css">

    <style>

        body{
            background: #f4f7fc;
            font-family: Arial, Helvetica, sans-serif;
        }

        .admin-container{
            text-align: center;
            margin-top: 50px;
        }

        .admin-buttons{
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .admin-card{
            background: white;
            padding: 30px;
            width: 250px;
            border-radius: 12px;
            box-shadow:
            0px 4px 10px rgba(0,0,0,0.1);
        }

        .admin-card h2{
            margin-bottom: 15px;
            color: #333;
        }

        .admin-card p{
            color: #666;
            margin-bottom: 20px;
        }

        button{
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #6c63ff;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover{
            background: #574bdb;
        }

    </style>

</head>

<body>

    <div class="admin-container">

        <h1>
            👨‍💼 Admin Panel
        </h1>

        <div class="admin-buttons">

            <div class="admin-card">

                <h2>Add Books</h2>

                <p>
                    Add new books to the library database.
                </p>

                <button onclick="goAddBooks()">
                    Add Books
                </button>

            </div>

            <div class="admin-card">

                <h2>View Books</h2>

                <p>
                    View all available books in library.
                </p>

                <button onclick="goBooks()">
                    View Books
                </button>

            </div>

            <div class="admin-card">

                <h2>Dashboard</h2>

                <p>
                    Return back to dashboard page.
                </p>

                <button onclick="goDashboard()">
                    Dashboard
                </button>

            </div>

            <div class="admin-card">

                <h2>Logout</h2>

                <p>
                    Logout safely from account.
                </p>

                <button onclick="logout()">
                    Logout
                </button>

            </div>

        </div>

    </div>

<script>

/* ROLE CHECK */

const role =
localStorage.getItem("role");

/* BLOCK STUDENTS */

if(role !== "admin"){

    alert(
        "Access Denied! Admin Only"
    );

    window.location.href =
    "/dashboard.html";

}

/* NAVIGATION */

function goAddBooks(){

    window.location.href =
    "/add_book.html";

}

function goBooks(){

    window.location.href =
    "/books.html";

}

function goDashboard(){

    window.location.href =
    "/dashboard.html";

}

/* LOGOUT */

function logout(){

    localStorage.clear();

    window.location.href =
    "/login.html";

}

</script>

</body>

</html>
