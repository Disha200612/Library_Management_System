<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Add Book</title>

    <link rel="stylesheet" href="style.css">

    <style>

        body{
            background: #f4f7fc;
            font-family: Arial, Helvetica, sans-serif;
        }

        .container{

            width: 420px;

            margin: auto;

            margin-top: 50px;

            background: white;

            padding: 30px;

            border-radius: 20px;

            box-shadow:
            0px 5px 15px rgba(0,0,0,0.1);
        }

        .top-bar{

            display: flex;

            justify-content: space-between;

            align-items: center;

            margin-bottom: 25px;
        }

        h1{
            color: #333;
        }

        form{
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input{

            width: 100%;

            padding: 12px;

            border: 1px solid #ccc;

            border-radius: 10px;

            outline: none;

            font-size: 15px;
        }

        input:focus{
            border-color: #6c63ff;
        }

        button{

            background: #6c63ff;

            color: white;

            border: none;

            padding: 12px;

            border-radius: 10px;

            cursor: pointer;

            font-size: 16px;

            transition: 0.3s;
        }

        button:hover{
            background: #574bdb;
        }

    </style>

</head>

<body>

    <div class="container">

        <div class="top-bar">

            <h1>
                📚 Add Book
            </h1>

            <button onclick="goAdmin()">
                Admin Panel
            </button>

        </div>

        <form id="bookForm">

            <input 
                type="text"
                id="title"
                placeholder="Enter Book Title"
                required
            >

            <input 
                type="text"
                id="author"
                placeholder="Enter Author Name"
                required
            >

            <input 
                type="text"
                id="category"
                placeholder="Enter Category"
                required
            >

            <input 
                type="number"
                id="quantity"
                placeholder="Enter Quantity"
                required
            >

            <button type="submit">
                Add Book
            </button>

        </form>

    </div>

<script>

/* ROLE CHECK */

const role =
localStorage.getItem("role");

/* BLOCK STUDENTS */

if(role !== "admin"){

    alert(
        "Access Denied! Admin Only"
    );

    window.location.href =
    "/dashboard.html";

}

/* ADD BOOK */

document.getElementById("bookForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const formData = new FormData();

    formData.append(

        "title",

        document.getElementById("title").value

    );

    formData.append(

        "author",

        document.getElementById("author").value

    );

    formData.append(

        "category",

        document.getElementById("category").value

    );

    formData.append(

        "quantity",

        document.getElementById("quantity").value

    );

    try{

        const response = await fetch(

            "http://127.0.0.1:8000/add-book",

            {
                method: "POST",
                body: formData
            }

        );

        const data = await response.json();

        alert(data.message);

        /* RESET FORM */

        document.getElementById("bookForm")
        .reset();

    }

    catch(error){

        console.log(error);

        alert("Failed To Add Book");

    }

});

/* GO ADMIN */

function goAdmin(){

    window.location.href =
    "/admin.html";

}

</script>

</body>

</html>
