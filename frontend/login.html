<!DOCTYPE html>
<html>

<head>

    <title>Library Login</title>

    <link rel="stylesheet" href="style.css">

    <style>

        body{
            background: #f4f4fb;
            font-family: Arial, Helvetica, sans-serif;
        }

        .login-container{

            width: 400px;

            margin: 80px auto;

            background: white;

            padding: 40px;

            border-radius: 20px;

            box-shadow:
            0px 5px 15px rgba(0,0,0,0.1);
        }

        h1{

            text-align: center;

            margin-bottom: 30px;

            color: #333;
        }

        input{

            width: 100%;

            padding: 14px;

            margin-bottom: 20px;

            border: 1px solid #ccc;

            border-radius: 10px;

            font-size: 16px;
        }

        button{

            width: 100%;

            padding: 14px;

            border: none;

            background: #6c63ff;

            color: white;

            border-radius: 10px;

            font-size: 16px;

            cursor: pointer;
        }

        button:hover{
            background: #574bdb;
        }

        .register-link{

            text-align: center;

            margin-top: 20px;
        }

        .register-link a{

            text-decoration: none;

            color: #6c63ff;

            font-weight: bold;
        }

    </style>

</head>

<body>

    <div class="login-container">

        <h1>
            📚 Library Login
        </h1>

        <form id="loginForm">

            <input
                type="email"
                id="email"
                placeholder="Enter Email"
                required
            >

            <input
                type="password"
                id="password"
                placeholder="Enter Password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

        <div class="register-link">

            <a href="/register.html">
                New User? Register Here
            </a>

        </div>

    </div>

<script>

document.getElementById("loginForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    /* CLEAR OLD STORAGE */

    localStorage.clear();

    const formData = new FormData();

    formData.append(

        "email",

        document.getElementById("email").value

    );

    formData.append(

        "password",

        document.getElementById("password").value

    );

    try{

        const response = await fetch(

            "http://127.0.0.1:8000/login",

            {
                method: "POST",
                body: formData
            }

        );

        const data = await response.json();

        console.log(data);

        if(data.message === "Login Successful"){

            /* SAVE USER */

            localStorage.setItem(

                "user",

                JSON.stringify(data.user)

            );

            /* SAVE ROLE */

            localStorage.setItem(

                "role",

                data.user.role

            );

            console.log(
                "ROLE:",
                data.user.role
            );

            alert("Login Successful");

            /* ADMIN LOGIN */

            if(
                data.user.role
                === "admin"
            ){

                window.location.replace(
                    "/admin.html"
                );

            }

            /* STUDENT LOGIN */

            else{

                window.location.replace(
                    "/dashboard.html"
                );

            }

        }

        else{

            alert(data.message);

        }

    }

    catch(error){

        console.log(error);

        alert("Login Failed");

    }

});

</script>

</body>

</html>
