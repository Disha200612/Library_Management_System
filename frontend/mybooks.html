<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>My Books</title>

    <link rel="stylesheet" href="style.css">

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background: #f4f4fb;
            display: flex;
        }

        /* SIDEBAR */

        .sidebar{

            width: 250px;
            height: 100vh;

            background:
            linear-gradient(
                to bottom,
                #241b4b,
                #3d2c8d
            );

            color: white;

            padding: 30px 20px;

            position: fixed;
        }

        .logo{

            font-size: 28px;
            font-weight: bold;

            margin-bottom: 50px;
        }

        .menu{
            list-style: none;
        }

        .menu li{
            margin: 20px 0;
        }

        .menu a{

            color: white;

            text-decoration: none;

            font-size: 18px;

            display: block;

            padding: 12px;

            border-radius: 10px;

            transition: 0.3s;
        }

        .menu a:hover{
            background: rgba(255,255,255,0.2);
        }

        /* MAIN */

        .main{

            margin-left: 270px;

            width: calc(100% - 270px);

            padding: 30px;
        }

        .top-bar{

            display: flex;

            justify-content: space-between;

            align-items: center;

            margin-bottom: 30px;
        }

        .top-bar h1{
            color: #333;
        }

        .books-container{

            display: grid;

            grid-template-columns:
            repeat(auto-fit, minmax(280px, 1fr));

            gap: 25px;
        }

        .book-card{

            background: white;

            padding: 25px;

            border-radius: 20px;

            box-shadow:
            0px 5px 15px rgba(0,0,0,0.1);

            transition: 0.3s;
        }

        .book-card:hover{
            transform: translateY(-8px);
        }

        .book-card h2{

            color: #6c63ff;

            margin-bottom: 10px;
        }

        .book-card p{

            margin-bottom: 10px;

            color: #555;
        }

        button{

            width: 100%;

            background: #6c63ff;

            color: white;

            border: none;

            padding: 12px;

            border-radius: 10px;

            cursor: pointer;

            font-size: 16px;

            transition: 0.3s;
        }

        button:hover{
            background: #574bdb;
        }

        .empty-text{

            text-align: center;

            font-size: 28px;

            color: #666;

            margin-top: 80px;

            font-weight: bold;
        }

    </style>

</head>

<body>

    <!-- SIDEBAR -->

    <div class="sidebar">

        <div class="logo">
            📚 Library
        </div>

        <ul class="menu">

            <li>
                <a href="/dashboard.html">
                    🏠 Dashboard
                </a>
            </li>

            <li>
                <a href="/books.html">
                    📖 View Books
                </a>
            </li>

            <li>
                <a href="/mybooks.html">
                    📚 My Books
                </a>
            </li>

            <li>
                <a href="/leaderboard.html">
                    🏆 Leaderboard
                </a>
            </li>

            <!-- ADMIN MENU -->

            <li id="adminMenu">

                <a href="/admin.html">
                    👨‍💼 Admin Panel
                </a>

            </li>

            <li>

                <a
                    href="/login.html"
                    onclick="logout()"
                >
                    🚪 Logout
                </a>

            </li>

        </ul>

    </div>

    <!-- MAIN -->

    <div class="main">

        <div class="top-bar">

            <h1>
                📚 My Issued Books
            </h1>

        </div>

        <div
            class="books-container"
            id="booksContainer"
        >

        </div>

    </div>

<script>

/* GET USER */

const user =
JSON.parse(localStorage.getItem("user"));

/* GET ROLE */

const role =
localStorage.getItem("role");

/* HIDE ADMIN FOR STUDENTS */

if(role !== "admin"){

    document.getElementById("adminMenu")
    .style.display = "none";

}

/* LOAD MY BOOKS */

async function loadMyBooks(){

    try{

        const response = await fetch(

            `http://127.0.0.1:8000/my-books/${user.id}`

        );

        const data = await response.json();

        let output = "";

        /* NO BOOKS */

        if(data.books.length === 0){

            output = `

                <h2 class="empty-text">

                    No Books Issued Yet

                </h2>

            `;

        }

        /* SHOW BOOKS */

        data.books.forEach(book => {

            output += `

                <div class="book-card">

                    <h2>
                        ${book.title}
                    </h2>

                    <p>
                        <b>Author:</b>
                        ${book.author}
                    </p>

                    <p>
                        <b>Category:</b>
                        ${book.category}
                    </p>

                    <p>
                        <b>Issued Date:</b>
                        ${book.issue_date}
                    </p>

                    <button
                        onclick="returnBook(${book.id})"
                    >
                        Return Book
                    </button>

                </div>

            `;

        });

        document.getElementById(
            "booksContainer"
        ).innerHTML = output;

    }

    catch(error){

        console.log(error);

        alert("Failed To Load Books");

    }

}

/* RETURN BOOK */

async function returnBook(issueId){

    const formData = new FormData();

    formData.append(
        "issue_id",
        issueId
    );

    try{

        const response = await fetch(

            "http://127.0.0.1:8000/return-book",

            {
                method: "POST",
                body: formData
            }

        );

        const data = await response.json();

        alert(data.message);

        loadMyBooks();

    }

    catch(error){

        console.log(error);

        alert("Return Failed");

    }

}

/* LOGOUT */

function logout(){

    localStorage.clear();

}

/* INITIAL LOAD */

loadMyBooks();

</script>

</body>

</html>
